name: 'Check: Testflow (GUI)'

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/check_testflow_gui.yml'
      - 'share/testflowscripts/**'
      - 'src/app/**'
      - 'muse/framework/interactive/**'
      - 'muse/framework/testflow/**'
      - '.gitmodules'
      - 'ninja_build.ps1'
  pull_request:
    paths:
      - '.github/workflows/check_testflow_gui.yml'
      - 'share/testflowscripts/**'
      - 'src/app/**'
      - 'muse/framework/interactive/**'
      - 'muse/framework/testflow/**'
      - '.gitmodules'
      - 'ninja_build.ps1'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }} ${{ github.event_name }} ${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2025
    timeout-minutes: 90

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat qtnetworkauth qtshadertools qtwebsockets'
          cache: true

      - name: Setup environment
        run: buildscripts\ci\windows\setup.bat

      - name: Install ccache
        shell: cmd
        run: choco install ccache -y --no-progress

      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/ccache
          key: ccache-${{ runner.os }}-${{ hashFiles('src/**/*.cpp', 'src/**/*.h', 'muse/**/*.cpp', 'muse/**/*.h', 'CMakeLists.txt', 'ninja_build.ps1', 'ninja_build.bat', 'muse/buildscripts/cmake/*.cmake', '.gitmodules') }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Restore build directory cache
        uses: actions/cache@v4
        with:
          path: build.release
          key: build-release-${{ runner.os }}-${{ hashFiles('src/**/*.cpp', 'src/**/*.h', 'muse/**/*.cpp', 'muse/**/*.h', 'CMakeLists.txt', 'ninja_build.ps1', 'ninja_build.bat', 'muse/buildscripts/cmake/*.cmake', '.gitmodules') }}
          restore-keys: |
            build-release-${{ runner.os }}-

      - name: Build (RelWithDebInfo)
        shell: cmd
        env:
          MUSE_MODULE_AUDIO_EXPORT: 'OFF'
          MUSE_MODULE_AUDIO_ASIO: 'OFF'
          CCACHE_DIR: '~/AppData/Local/ccache'
        run: |
          XCOPY "C:\musescore_dependencies" %CD% /E /I /Y
          SET "JACK_DIR=C:\Program Files (x86)\Jack"
          SET "PATH=%JACK_DIR%;%PATH%"
          SET "CCACHE_DIR=%USERPROFILE%\AppData\Local\ccache"
          ninja_build.bat -t relwithdebinfo-target --build-target MuseScoreStudio5.exe

      - name: Upload build artifact
        uses: actions/upload-artifact@v7
        with:
          name: musescore-build
          path: build.release
          if-no-files-found: error
          retention-days: 1

  test:
    needs: build
    runs-on: windows-2025
    timeout-minutes: 90

    steps:
      - name: Clone repository
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Qt
        uses: jurplel/install-qt-action@v4
        with:
          version: 6.10.2
          host: 'windows'
          target: 'desktop'
          arch: 'win64_msvc2022_64'
          modules: 'qt5compat qtnetworkauth qtshadertools qtwebsockets'
          cache: true

      - name: Download build artifact
        uses: actions/download-artifact@v5
        with:
          name: musescore-build
          path: build.release

      - name: Pre-seed MuseScore settings
        shell: pwsh
        run: |
          # QSettings (IniFormat, UserScope) stores at %APPDATA%\MuseScore\MuseScoreStudio5Development.ini
          $settingsDir = "$env:APPDATA\MuseScore"
          New-Item -ItemType Directory -Force -Path $settingsDir | Out-Null
          $iniPath = "$settingsDir\MuseScoreStudio5Development.ini"
          "[application]`r`nhasCompletedFirstLaunchSetup=true`r`nwelcomeDialogShowOnStartup=false`r`nwelcomeDialogLastShownVersion=5.0.0" | Set-Content -Path $iniPath -Encoding UTF8
          Write-Host "Wrote settings to $iniPath"

      - name: Run testflow GUI test
        shell: pwsh
        timeout-minutes: 10
        env:
          QT_QUICK_BACKEND: 'software'
        run: |
          $exe = Join-Path $PWD "build.release\MuseScoreStudio5.exe"
          $script = Join-Path $PWD "share\testflowscripts\TC11_CommandPaletteDialog.js"
          if (-not (Test-Path $exe)) {
            Write-Host "::error::Build output not found: $exe"
            exit 1
          }
          if (-not (Test-Path $script)) {
            Write-Host "::error::Testflow script not found: $script"
            exit 1
          }
          Write-Host "Running: $exe --test-case-gui $script"
          $proc = Start-Process -FilePath $exe -ArgumentList "--test-case-gui",$script -Wait -PassThru -WorkingDirectory $PWD
          $exitCode = $proc.ExitCode
          if ($exitCode -ne 0) {
            Write-Host "::error::Testflow failed with exit code $exitCode"
            exit $exitCode
          }
          Write-Host "Testflow passed!"

      - name: Collect logs on failure
        if: failure()
        shell: pwsh
        run: |
          $logDir = "$env:LOCALAPPDATA\MuseScore\MuseScoreStudio5Development\logs"
          if (Test-Path $logDir) {
            New-Item -ItemType Directory -Force -Path "ci-logs" | Out-Null
            Copy-Item "$logDir\*.log" -Destination "ci-logs\" -ErrorAction SilentlyContinue
            Write-Host "Copied logs from $logDir"
          } else {
            Write-Host "No log directory found at $logDir"
          }

      - name: Upload logs
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: testflow-logs
          path: ci-logs/
          if-no-files-found: ignore
